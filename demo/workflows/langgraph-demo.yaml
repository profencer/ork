# Bidirectional LangGraph peer (ADR 0007 + LangGraph).
#
# One step targets `langgraph-researcher` (registered in demo/config/default.toml).
# The LangGraph graph must call `ask_ork(agent_id="researcher", ...)` so ork serves
# the reverse A2A leg to the local researcher agent (code_search, list_repos, …).
#
# Requires `MINIMAX_API_KEY` for the LangGraph LLM and a running langgraph-agent on :8092.

name: langgraph-demo
version: "1.0"
trigger:
  type: manual

steps:
  - id: via_langgraph
    agent: langgraph-researcher
    tools: []
    prompt_template: >
      Task: {{input.task}}

      Instructions: You are the LangGraph demo peer. Use the ask_ork tool with agent_id "researcher"
      to look up facts in the anthropic-sdk-typescript repo (see demo config repositories).
      Summarise findings in one paragraph.
    depends_on: []
